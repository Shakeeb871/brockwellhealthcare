{% extends "base.html" %}
{% load region_tags %}

{% block content %}
<div class="page-head">
  <div class="container">
    <nav class="breadcrumbs" aria-label="Breadcrumb">
      <a href="{% rurl 'core:home' %}">Home</a> / <span>{{ page.title }}</span>
    </nav>
    <h1>{{ page.title }}</h1>
  </div>
</div>

<section class="section">
  <div class="container">
    <article class="prose">
      {% for kind, text in page.blocks %}
        {% if kind == "heading" %}<h2>{{ text }}</h2>{% else %}<p>{{ text }}</p>{% endif %}
      {% endfor %}
    </article>
  </div>
</section>
{% endblock %}
