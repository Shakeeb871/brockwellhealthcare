{% load static %}<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#f6f7f9;font-family:Arial,Helvetica,sans-serif;color:#1a1c20;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f6f7f9;padding:24px 12px;">
    <tr><td align="center">
      <table role="presentation" cellpadding="0" cellspacing="0" width="600" style="width:600px;max-width:100%;background:#ffffff;border:1px solid #e4ebe2;border-radius:10px;overflow:hidden;">
        <tr><td style="background:#12351f;padding:20px 28px;">
          <span style="color:#ffffff;font-size:20px;font-weight:700;letter-spacing:.2px;">{{ brand }}</span>
        </td></tr>
        <tr><td style="padding:28px;">
          {% block content %}{% endblock %}
        </td></tr>
        <tr><td style="padding:18px 28px;background:#f6f7f9;border-top:1px solid #e4ebe2;color:#4d545c;font-size:12px;line-height:1.7;">
          {% if region %}{% if region.address %}{{ region.address }}<br>{% endif %}
          <a href="tel:{{ region.phone }}" style="color:#2e7d46;text-decoration:none;">{{ region.phone }}</a>
          &nbsp;·&nbsp;
          <a href="mailto:{{ region.email }}" style="color:#2e7d46;text-decoration:none;">{{ region.email }}</a><br>{% endif %}
          <span style="color:#8b929c;">© {% now "Y" %} {{ brand }}. This is an automated message.</span>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
